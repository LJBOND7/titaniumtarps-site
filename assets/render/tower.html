<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Inter:wght@400;500;600&display=swap');
  html,body{ margin:0; padding:0; background:#0b0e13; }
  #stage{ width:1600px; height:1200px; }
  .h{ font-family:'Archivo',system-ui,sans-serif; }
  .b{ font-family:'Inter',system-ui,sans-serif; }
</style>
</head>
<body>
<svg id="stage" width="1600" height="1200" viewBox="0 0 1600 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#10568c"/>
      <stop offset="0.45" stop-color="#3f8cc0"/>
      <stop offset="0.8"  stop-color="#9fcbe6"/>
      <stop offset="1"    stop-color="#d7ebf6"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.82" cy="0.12" r="0.5">
      <stop offset="0" stop-color="#fff8e8" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#fff8e8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4cdd4"/>
      <stop offset="1" stop-color="#9aa6af"/>
    </linearGradient>

    <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34546d"/><stop offset="0.5" stop-color="#6b97b4"/><stop offset="1" stop-color="#284558"/>
    </linearGradient>
    <linearGradient id="glassV" x1="0" y1="0" x2="0.18" y2="1">
      <stop offset="0" stop-color="#8fb4ce"/><stop offset="0.5" stop-color="#547f9d"/><stop offset="1" stop-color="#2f536c"/>
    </linearGradient>
    <pattern id="grid" width="40" height="24" patternUnits="userSpaceOnUse">
      <rect x="0" y="17.5" width="40" height="6.5" fill="#16293799" opacity="0.5"/>
      <line x1="0.5" y1="0" x2="0.5" y2="24" stroke="#152634" stroke-width="0.9" stroke-opacity="0.55"/>
      <line x1="0" y1="0.4" x2="40" y2="0.4" stroke="#16293a" stroke-width="0.6" stroke-opacity="0.3"/>
    </pattern>

    <linearGradient id="filmGrad" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0" stop-color="#fcfdff"/>
      <stop offset="1" stop-color="#dfe8ef"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.38" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.62" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="seams" width="44" height="12" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#b9c3cb" stroke-width="1.6"/>
      <line x1="1.8" y1="0" x2="1.8" y2="12" stroke="#ffffff" stroke-width="1.1"/>
    </pattern>
    <pattern id="filmfloors" width="12" height="24" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0.5" x2="12" y2="0.5" stroke="#c2ccd3" stroke-width="0.8" stroke-opacity="0.6"/>
    </pattern>
    <filter id="filmtex" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.026" numOctaves="3" seed="11" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.13"/></feComponentTransfer>
    </filter>
    <filter id="bshadow" x="-30%" y="-10%" width="160%" height="130%">
      <feDropShadow dx="-22" dy="14" stdDeviation="26" flood-color="#0a2233" flood-opacity="0.32"/>
    </filter>
    <filter id="soft"><feGaussianBlur stdDeviation="0.5"/></filter>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="1200" fill="url(#sky)"/>
  <rect width="1600" height="1200" fill="url(#sun)"/>
  <!-- distant skyline silhouette -->
  <g opacity="0.16" fill="#2b566f">
    <rect x="120" y="930" width="60" height="160"/><rect x="190" y="900" width="42" height="190"/>
    <rect x="250" y="955" width="70" height="135"/><rect x="1180" y="910" width="52" height="180"/>
    <rect x="1240" y="945" width="66" height="145"/><rect x="1320" y="885" width="46" height="205"/>
    <rect x="1380" y="935" width="80" height="155"/>
  </g>
  <!-- ground -->
  <rect x="0" y="1080" width="1600" height="120" fill="url(#ground)"/>
  <ellipse cx="780" cy="1092" rx="360" ry="26" fill="#6f7c86" opacity="0.45"/>

  <!-- Tower crane (compact, above the building) -->
  <g stroke="#586571" stroke-width="2.4" fill="none" opacity="0.95">
    <!-- mast -->
    <line x1="986" y1="64" x2="986" y2="300"/><line x1="992" y1="64" x2="992" y2="300"/>
    <line x1="986" y1="92" x2="992" y2="74"/><line x1="986" y1="120" x2="992" y2="102"/>
    <line x1="986" y1="148" x2="992" y2="130"/><line x1="986" y1="176" x2="992" y2="158"/>
    <line x1="986" y1="204" x2="992" y2="186"/><line x1="986" y1="232" x2="992" y2="214"/>
    <line x1="986" y1="260" x2="992" y2="242"/><line x1="986" y1="288" x2="992" y2="270"/>
    <!-- jib + counter-jib -->
    <line x1="652" y1="96" x2="1034" y2="96"/>
    <line x1="664" y1="105" x2="1020" y2="105"/>
    <!-- A-frame ties -->
    <line x1="989" y1="60" x2="664" y2="96"/><line x1="989" y1="60" x2="1020" y2="96"/>
    <line x1="989" y1="60" x2="989" y2="96"/>
  </g>
  <rect x="1012" y="98" width="26" height="16" rx="2" fill="#54616d" stroke="#3f4a54" stroke-width="1.5"/>

  <!-- ===== Building ===== -->
  <g filter="url(#bshadow)">
    <!-- roof top face (receding right) -->
    <polygon points="600,140 960,140 1012,176 652,176" fill="#cfd7de"/>
    <polygon points="600,140 960,140 1012,176 652,176" fill="none" stroke="#9aa6af" stroke-width="1"/>
    <!-- right depth face -->
    <polygon points="960,140 1012,176 1012,1044 960,1080" fill="url(#glassGrad)"/>
    <polygon points="960,140 1012,176 1012,1044 960,1080" fill="#0a1c29" opacity="0.34"/>
    <!-- front structural base (shows through film) -->
    <rect x="600" y="140" width="360" height="940" fill="#b7c0c9"/>
  </g>

  <!-- front glass: upper glazed -->
  <rect x="600" y="140" width="360" height="400" fill="url(#glassV)"/>
  <rect x="600" y="140" width="360" height="400" fill="url(#grid)"/>
  <rect x="600" y="140" width="360" height="400" fill="url(#sheen)" opacity="0.5"/>
  <!-- front glass: lower glazed -->
  <rect x="600" y="720" width="360" height="360" fill="url(#glassV)"/>
  <rect x="600" y="720" width="360" height="360" fill="url(#grid)"/>
  <rect x="600" y="720" width="360" height="360" fill="url(#sheen)" opacity="0.5"/>

  <!-- ===== Film band (floors wrapped) front + wrapping onto right face ===== -->
  <!-- right-face portion of the wrap -->
  <polygon points="960,540 1012,576 1012,720 960,720" fill="url(#filmGrad)"/>
  <polygon points="960,540 1012,576 1012,720 960,720" fill="#0a1c29" opacity="0.18"/>
  <!-- front portion of the wrap -->
  <g>
    <rect x="600" y="540" width="360" height="180" fill="url(#filmGrad)"/>
    <rect x="600" y="540" width="360" height="180" fill="url(#filmfloors)"/>
    <rect x="600" y="540" width="360" height="180" fill="url(#seams)"/>
    <rect x="600" y="540" width="360" height="180" fill="#7f8b94" filter="url(#filmtex)"/>
    <rect x="600" y="540" width="360" height="180" fill="url(#sheen)"/>
    <!-- soft top & bottom tuck shadows where film meets glass -->
    <rect x="600" y="540" width="360" height="8" fill="#9aa6af" opacity="0.5"/>
    <rect x="600" y="712" width="360" height="8" fill="#8a96a0" opacity="0.55"/>
    <!-- film outline -->
    <rect x="600" y="540" width="360" height="180" fill="none" stroke="#aeb9c1" stroke-width="1.2"/>
  </g>

  <!-- building front outline -->
  <rect x="600" y="140" width="360" height="940" fill="none" stroke="#7d8993" stroke-width="1.4"/>

  <!-- crane hook line + film roll being hoisted into place (storytelling) -->
  <line x1="800" y1="105" x2="800" y2="532" stroke="#586571" stroke-width="1.5" opacity="0.9"/>
  <g transform="translate(776,520)">
    <rect x="0" y="0" width="48" height="20" rx="9" fill="#fcfdff" stroke="#aeb9c1" stroke-width="1.3"/>
    <ellipse cx="48" cy="10" rx="5" ry="10" fill="#e6edf2" stroke="#aeb9c1" stroke-width="1.3"/>
    <line x1="800" y1="0" x2="800" y2="0" stroke="none"/>
  </g>

  <!-- ===== Annotations ===== -->
  <!-- leader lines -->
  <g stroke="#1c6491" stroke-width="2" fill="none">
    <path d="M960,300 H1040"/>
    <path d="M1012,624 H1044"/>
    <path d="M960,900 H1040"/>
  </g>
  <g fill="#1c6491"><circle cx="960" cy="300" r="4.5"/><circle cx="1012" cy="624" r="4.5"/><circle cx="960" cy="900" r="4.5"/></g>

  <!-- Card A: glazing complete (top) -->
  <g>
    <rect x="1040" y="262" width="486" height="78" rx="12" fill="#ffffff" opacity="0.92"/>
    <text class="h" x="1062" y="292" font-size="19" font-weight="800" letter-spacing="2" fill="#1c6491">GLAZING COMPLETE</text>
    <text class="b" x="1062" y="320" font-size="20" fill="#23323d">Upper floors enclosed and weather-tight.</text>
  </g>

  <!-- Card B: enclosure (the point) -->
  <g>
    <rect x="1040" y="486" width="500" height="232" rx="14" fill="#ffffff" opacity="0.95"/>
    <rect x="1040" y="486" width="6" height="232" rx="3" fill="#2f93cf"/>
    <text class="h" x="1066" y="524" font-size="22" font-weight="900" letter-spacing="0.5" fill="#0e2233">TITANIUM TARPS ENCLOSURE</text>
    <text class="h" x="1066" y="552" font-size="14.5" font-weight="700" letter-spacing="2.5" fill="#2f93cf">WINDOWS DELAYED. WORK CONTINUES.</text>
    <text class="b" x="1066" y="588" font-size="19" fill="#23323d"><tspan x="1066" dy="0">Glass and doors are behind schedule on these</tspan><tspan x="1066" dy="27">floors. We seal the open facade between the floor</tspan><tspan x="1066" dy="27">slabs with proprietary film, so the structure stays</tspan><tspan x="1066" dy="27">dry and interior trades keep working on schedule.</tspan></text>
  </g>

  <!-- Card C: lower floors -->
  <g>
    <rect x="1040" y="862" width="486" height="78" rx="12" fill="#ffffff" opacity="0.92"/>
    <text class="h" x="1062" y="892" font-size="19" font-weight="800" letter-spacing="2" fill="#1c6491">LOWER FLOORS ENCLOSED</text>
    <text class="b" x="1062" y="920" font-size="20" fill="#23323d">Glazing installed up to the enclosure line.</text>
  </g>

  <!-- ===== Title ===== -->
  <text class="h" x="70" y="150" font-size="62" font-weight="900" fill="#ffffff" letter-spacing="-1">When the glass is late,</text>
  <text class="h" x="70" y="218" font-size="62" font-weight="900" fill="#bfe6fb" letter-spacing="-1">keep building.</text>
  <text class="b" x="74" y="262" font-size="23" fill="#eaf4fb">Titanium Tarps temporary facade enclosure for high-rise construction.</text>

  <!-- logo + caption -->
  <image href="/assets/logo/logo-oficial.png" x="70" y="1112" width="250" height="62"/>
  <text class="b" x="1526" y="1158" font-size="17" fill="#3a4a55" text-anchor="end">Representative target tower, Brickell. Illustration.</text>
</svg>
</body>
</html>
